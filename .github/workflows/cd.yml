# CD workflow: build/push image to GHCR and deploy to Linode via SSH.
name: CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,format=long
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy on Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/fastapi-fullstack-prod

            # Inject .env from secret bundle. Store key=value lines in PROD_ENV_VARS.
            cat > .env <<'EOF_ENV'
            ${{ secrets.PROD_ENV_VARS }}
            EOF_ENV

            # Ensure deployed image tag tracks latest push.
            export API_IMAGE=ghcr.io/${{ github.repository }}/api:sha-${{ github.sha }}
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Run migrations in one-off container.
            docker compose -f docker-compose.prod.yml run --rm api alembic -c apps/api/alembic.ini upgrade head

            # Post-deploy health check.
            curl -fsS https://${{ secrets.PROD_DOMAIN }}/health/ready

            # Rollback quick note:
            # 1) export API_IMAGE=ghcr.io/<org>/<repo>/api:<older-tag>
            # 2) docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
