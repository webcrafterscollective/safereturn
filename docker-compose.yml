version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lostfound
      POSTGRES_USER: lostfound
      POSTGRES_PASSWORD: lostfound
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://lostfound:lostfound@postgres:5432/lostfound
      JWT_SECRET_KEY: change-me-in-production
      FERNET_KEY: xVdY8US9hQFoY8A9HtV6nRvWmvMRGsiE9zMDFMvx6bM=
      ADMIN_API_KEY: dev-admin-key
    ports:
      - "8000:8000"

volumes:
  postgres_data:
